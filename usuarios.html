<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Gerenciar Usuários | Sistema de Estoque</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body class="d-flex" data-page="usuarios">
  
  <!-- Sidebar -->
  <div id="navbar-placeholder"></div>
  <script src="./js/navbar.js"></script>

  <div id="page-content" class="flex-grow-1 p-4">
    <h1 class="mb-4">Gerenciar Usuários</h1>

    <div class="bg-white p-4 rounded-4 shadow-sm">
      <div class="d-flex justify-content-between mb-3 flex-wrap gap-2">
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalUsuario">
          <i class="bi bi-plus-lg"></i> Novo Usuário
        </button>
        <div style="min-width: 250px;">
          <input type="text" class="form-control" placeholder="Pesquisar usuário...">
        </div>
      </div>

      <div class="table-responsive">
        <table class="table table-hover align-middle">
          <thead>
            <tr>
              <th>Nome</th>
              <th>Usuário</th>
              <th>Perfil</th>
              <th class="text-end">Ações</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>João Silva</td>
              <td>joaosilva</td>
              <td><span class="badge bg-primary">Nível 1</span></td>
              <td class="text-end">
                <button class="btn btn-sm btn-outline-info me-1" title="Ver Histórico"><i class="bi bi-clock-history"></i></button>
                <button class="btn btn-sm btn-outline-secondary me-1" title="Editar"><i class="bi bi-pencil"></i></button>
                <button class="btn btn-sm btn-outline-danger" title="Excluir"><i class="bi bi-trash"></i></button>
              </td>
            </tr>
            <tr>
              <td>Maria Souza</td>
              <td>mariasouza</td>
              <td><span class="badge bg-info text-dark">Nível 2</span></td>
              <td class="text-end">
                <button class="btn btn-sm btn-outline-info me-1" title="Ver Histórico"><i class="bi bi-clock-history"></i></button>
                <button class="btn btn-sm btn-outline-secondary me-1" title="Editar"><i class="bi bi-pencil"></i></button>
                <button class="btn btn-sm btn-outline-danger" title="Excluir"><i class="bi bi-trash"></i></button>
              </td>
            </tr>
            <tr>
              <td>Lucas Lima</td>
              <td>lucaslima</td>
              <td><span class="badge bg-warning text-dark">Nível 3</span></td>
              <td class="text-end">
                <button class="btn btn-sm btn-outline-info me-1" title="Ver Histórico"><i class="bi bi-clock-history"></i></button>
                <button class="btn btn-sm btn-outline-secondary me-1" title="Editar"><i class="bi bi-pencil"></i></button>
                <button class="btn btn-sm btn-outline-danger" title="Excluir"><i class="bi bi-trash"></i></button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Modal para adicionar/editar usuário -->
  <div class="modal fade" id="modalUsuario" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <form>
          <div class="modal-header">
            <h5 class="modal-title">Adicionar Usuário</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <div class="mb-3">
              <label for="nomeUsuario" class="form-label">Nome <span class="text-danger">*</span></label>
              <input type="text" class="form-control" id="nomeUsuario" required>
            </div>
            <div class="mb-3">
              <label for="usuarioLogin" class="form-label">Usuário <span class="text-danger">*</span></label>
              <input type="text" class="form-control" id="usuarioLogin" required>
            </div>
            <div class="mb-3">
              <label for="senhaUsuario" class="form-label">Senha <span class="text-danger">*</span></label>
              <input type="password" class="form-control" id="senhaUsuario" required>
            </div>
            <div class="mb-3">
              <label for="perfilUsuario" class="form-label">Perfil <span class="text-danger">*</span></label>
              <select class="form-select" id="perfilUsuario" required>
                <option value="">Selecione...</option>
                <option value="1">Nível 1</option>
                <option value="2">Nível 2</option>
                <option value="3">Nível 3</option>
              </select>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" class="btn btn-primary">Salvar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
